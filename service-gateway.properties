server.port=8083

eureka.client.service-url.defaultZone=http://localhost:8081/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=service-account-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://service-account
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/account/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=2

spring.cloud.gateway.server.webflux.routes[1].id=auth-service-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=2

spring.cloud.gateway.server.webflux.routes[2].id=document-intelligence-route
spring.cloud.gateway.server.webflux.routes[2].uri=lb://document-intelligence-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/documents/**

spring.cloud.gateway.server.webflux.routes[3].id=service-customer-route
spring.cloud.gateway.server.webflux.routes[3].uri=lb://service-customer
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/customer/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=2

spring.cloud.gateway.server.webflux.routes[4].id=transaction-service-route
spring.cloud.gateway.server.webflux.routes[4].uri=lb://transaction-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/transactions/**

management.endpoints.web.exposure.include=health,info,gateway
